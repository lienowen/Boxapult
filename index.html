<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10233d" />
    <meta
      name="description"
      content="Parcel Patrol is a fast browser arcade game about defending a sky-delivery route."
    />
    <title>Parcel Patrol</title>
  </head>
  <body>
    <main id="game-root" aria-label="Parcel Patrol game"></main>
    <section id="orientation-guard" role="status" aria-live="polite">
      <div class="orientation-card">
        <div class="orientation-icon" aria-hidden="true">↻</div>
        <strong>TURN FOR DELIVERY</strong>
        <span>Rotate your device or widen the window to play Parcel Patrol.</span>
      </div>
    </section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
