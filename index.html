<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090b18" />
  <meta name="description" content="Cargo Renegade — steal the energy cores and break the corporate blockade." />
  <title>Cargo Renegade</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="game-root" aria-label="Cargo Renegade game"></main>
  <section id="orientation-guard" role="status" aria-live="polite">
    <div class="orientation-card">
      <div class="orientation-icon">↻</div>
      <strong>ROTATE TO BREAK THROUGH</strong>
      <span>Use landscape mode or widen the browser window.</span>
    </div>
  </section>
  <div id="load-error" hidden>
    <strong>Renegade systems failed to initialize.</strong>
    <span>Check the network connection, then refresh.</span>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.90.0/phaser.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"
          onerror="document.getElementById('load-error').hidden=false"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
